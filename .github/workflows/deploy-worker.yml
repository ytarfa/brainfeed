name: Deploy Worker Enrichment (Railway)

on:
  push:
    branches: [staging]
    paths:
      - "packages/worker-enrichment/**"
      - "packages/types/**"
      - "packages/error-types/**"
      - "packages/logger/**"
      - "packages/worker-core/**"
      - ".github/workflows/deploy-worker.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "tsconfig.json"

jobs:
  deploy:
    name: Deploy to Railway (test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: >
          railway up
          --project "${{ secrets.RAILWAY_PROJECT_ID }}"
          --service "${{ secrets.RAILWAY_WORKER_SERVICE_ID }}"
          --environment test
          --detach
