name: Deploy Backend (Railway)

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "railway.toml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "tsconfig.json"

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: railway up --service "$RAILWAY_SERVICE_ID" --detach

      - name: Wait for deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          echo "Waiting for deployment to complete..."
          for i in $(seq 1 20); do
            STATUS=$(railway status --service "$RAILWAY_SERVICE_ID" --json 2>/dev/null | jq -r '.deploymentStatus // empty' || echo "unknown")
            echo "Attempt $i/20 — status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Deployment succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "Deployment failed with status: $STATUS"
              railway logs --service "$RAILWAY_SERVICE_ID" --lines 50 || true
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deployment status."
          exit 1
