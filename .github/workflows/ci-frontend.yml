name: CI Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "tsconfig.json"

jobs:
  lint-and-build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter @brain-feed/frontend run lint

      - name: Build frontend
        run: pnpm --filter @brain-feed/frontend run build
