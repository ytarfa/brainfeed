name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter @brain-feed/backend run lint

      - name: Lint frontend
        run: pnpm --filter @brain-feed/frontend run lint

      - name: Build backend
        run: pnpm --filter @brain-feed/backend run build

      - name: Build frontend
        run: pnpm --filter @brain-feed/frontend run build

      - name: Test backend
        run: pnpm --filter @brain-feed/backend run test
